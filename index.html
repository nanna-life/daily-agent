const DAYS=["일","월","화","수","목","금","토"];
function getTodayKey(){return new Date().toISOString().slice(0,10);}
function getStreak(history){
  let streak=0,d=new Date();d.setDate(d.getDate()-1);
  while(true){const key=d.toISOString().slice(0,10);if(history[key]?.completed){streak++;d.setDate(d.getDate()-1);}else break;}
  return streak;
}

async function dbLoad(){
  const {data}=await sb.from("daily_data").select("*").eq("user_id",USER_ID).single();
  return data||null;
}
async function dbSave(tasks,history){
  const {data:ex}=await sb.from("daily_data").select("id").eq("user_id",USER_ID).single();
  if(ex){await sb.from("daily_data").update({tasks,history,updated_at:new Date().toISOString()}).eq("user_id",USER_ID);}
  else{await sb.from("daily_data").insert({user_id:USER_ID,tasks,history});}
}

            <div key={key} style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:"#2a2a2a",marginBottom:3}}>{day}</div>
              <div style={{width:34,height:34,borderRadius:8,background:data?.completed?"#4ade80":data?"#f97316":"#141414",border:key===todayKey?"2px solid #facc15":"2px solid transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:data?"#000":"#1e1e1e",fontWeight:700}}>
                {data?`${data.progress}`:"·"}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Nav */}
      <div style={{display:"flex",marginTop:18,background:"#111",borderRadius:10,overflow:"hidden",border:"1px solid #1a1a1a",width:"calc(100% - 36px)",maxWidth:500,margin:"18px auto 0"}}>
        {[["today","오늘"],["plan","루틴 플랜"],["brief","AI 브리핑"],["history","기록"]].map(([v,label])=>(
          <button key={v} onClick={()=>v==="brief"?fetchBrief():setTab(v)} style={{flex:1,padding:"11px 0",border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:tab===v?"#facc15":"transparent",color:tab===v?"#000":"#444",transition:"all 0.2s"}}>
            {label}
          </button>
        ))}
      </div>

      {/* 오늘 */}
      {tab==="today"&&(
        <div style={{...W.wrap,marginTop:18}}>
          <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
            {AREAS.map(a=>{
              const done=tasks[a.id].filter(t=>t.done).length,total=tasks[a.id].length;
              return(<button key={a.id} onClick={()=>setActiveArea(a.id)} style={{flexShrink:0,padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",background:activeArea===a.id?a.color:"#141414",color:activeArea===a.id?"#000":"#444",fontSize:12,fontWeight:700,transition:"all 0.2s",whiteSpace:"nowrap"}}>{a.label} {done}/{total}</button>);
            })}
          </div>
          <div style={{background:"#111",borderRadius:14,border:"1px solid #1a1a1a",overflow:"hidden"}}>
            {tasks[activeArea].map((task,i)=>(
              <div key={task.id} style={{display:"flex",alignItems:"center",padding:"13px 15px",borderBottom:i<tasks[activeArea].length-1?"1px solid #161616":"none",gap:11}}>
                <div onClick={()=>toggleTask(activeArea,task.id)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:"pointer",background:task.done?area.color:"transparent",border:`2px solid ${task.done?area.color:"#252525"}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
                  {task.done&&<span style={{fontSize:11,color:"#000",fontWeight:900}}>✓</span>}
                </div>
                <span style={{flex:1,fontSize:13,color:task.done?"#333":"#ccc",textDecoration:task.done?"line-through":"none",transition:"all 0.15s"}}>{task.text}</span>
                <button onClick={()=>removeTask(activeArea,task.id)} style={{background:"none",border:"none",color:"#252525",cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>×</button>
              </div>
            ))}
            <div style={{display:"flex",padding:"9px 11px",gap:7,borderTop:"1px solid #161616"}}>
              <input value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask(activeArea)} placeholder="할 일 추가..." style={{flex:1,background:"#161616",border:"1px solid #202020",borderRadius:7,color:"#bbb",padding:"8px 11px",fontSize:12,outline:"none"}}/>
              <button onClick={()=>addTask(activeArea)} style={{background:area.color,color:"#000",border:"none",borderRadius:7,padding:"8px 16px",cursor:"pointer",fontWeight:700,fontSize:14}}>+</button>
            </div>
          </div>
          {!todaySaved&&progress>0&&(
            <button onClick={saveDay} style={{width:"100%",marginTop:12,padding:"13px",background:"#111",border:"1px solid #222",borderRadius:12,color:"#444",fontSize:12,cursor:"pointer"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#facc15";e.currentTarget.style.color="#facc15";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#222";e.currentTarget.style.color="#444";}}>
              오늘 마무리 & 기록 저장 →
            </button>
          )}
          {todaySaved&&<div style={{textAlign:"center",marginTop:12,color:"#4ade80",fontSize:12}}>✓ 저장 완료 · 모든 기기에 동기화됨</div>}
        </div>
      )}

      {/* 루틴 플랜 */}
      {tab==="plan"&&(
        <div style={{...W.wrap,marginTop:18}}>
          <div style={{display:"flex",marginBottom:16,background:"#111",borderRadius:8,overflow:"hidden",border:"1px solid #1a1a1a"}}>
            {[["week","요일 플랜"],["meal","식단"],["skeleton","매일 뼈대"],["principles","원칙"]].map(([v,l])=>(
              <button key={v} onClick={()=>setPlanTab(v)} style={{flex:1,padding:"8px 0",border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:planTab===v?"#1e1e1e":"transparent",color:planTab===v?"#facc15":"#444",borderBottom:planTab===v?"2px solid #facc15":"2px solid transparent",transition:"all 0.2s"}}>{l}</button>
            ))}
          </div>

          {planTab==="week"&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
              {WEEK_PLAN.map(({day,theme,accent,items})=>(
                <div key={day} style={{background:"#111",borderRadius:12,border:`1px solid ${accent?"#c8391a":"#1a1a1a"}`,overflow:"hidden"}}>
                  <div style={{background:accent?"#c8391a":"#181818",color:"#fff",padding:"7px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontWeight:800,fontSize:14}}>{day}요일</span>
                    <span style={{fontSize:9,color:accent?"rgba(255,255,255,0.7)":"#444"}}>{theme}</span>
                  </div>
                  <div style={{padding:"10px 12px"}}>
                    {items.map((item,i)=>(<div key={i} style={{fontSize:11,lineHeight:1.85,color:"#666",display:"flex",gap:5}}><span style={{color:"#c8391a",fontSize:9,marginTop:3,flexShrink:0}}>▸</span>{item}</div>))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {planTab==="meal"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {MEAL_GUIDE.map(({title,time,items})=>(
                <div key={title} style={{background:"#111",borderRadius:12,border:"1px solid #1a1a1a",overflow:"hidden"}}>
                  <div style={{background:"#181818",padding:"9px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontWeight:700,fontSize:14}}>{title}</span>
                    <span style={{fontSize:10,color:"#444"}}>{time}</span>
                  </div>
                  <div style={{padding:"10px 14px"}}>
                    {items.map((item,i)=>(<div key={i} style={{fontSize:12,lineHeight:1.9,color:item.startsWith("→")?"#90e090":"#666",fontWeight:item.startsWith("→")?700:400,display:"flex",gap:6}}>{!item.startsWith("→")&&<span style={{color:"#c8391a",fontSize:10,marginTop:2,flexShrink:0}}>·</span>}{item}</div>))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {planTab==="skeleton"&&(
            <div style={{background:"#111",borderRadius:12,border:"1px solid #1a1a1a",overflow:"hidden"}}>
              {DAILY_SKELETON.map((row,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderBottom:i<DAILY_SKELETON.length-1?"1px solid #161616":"none"}}>
                  <div style={{fontFamily:"monospace",fontSize:10,color:"#c8391a",whiteSpace:"nowrap",minWidth:76,borderRight:"2px solid #1e1e1e",paddingRight:10}}>{row.time}</div>
                  <div style={{flex:1,fontSize:12,color:"#888",lineHeight:1.4}}>{row.text}</div>
                  <div style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:3,background:row.tagBg,color:row.tagColor,whiteSpace:"nowrap",flexShrink:0}}>{row.tag}</div>
                </div>
              ))}
            </div>
          )}

          {planTab==="principles"&&(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {PRINCIPLES.map(({n,text})=>(
                <div key={n} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px",background:"#111",borderRadius:10,border:"1px solid #1a1a1a"}}>
                  <span style={{fontFamily:"monospace",fontSize:12,color:"#c8391a",fontWeight:700,flexShrink:0,marginTop:1}}>{n}</span>
                  <span style={{fontSize:13,color:"#888",lineHeight:1.5}}>{text}</span>
                </div>
              ))}
              <div style={{marginTop:6,padding:"14px 16px",background:"#0a140a",border:"1px solid #1a2e1a",borderRadius:10,fontSize:12,color:"#4ade80",lineHeight:1.8,fontStyle:"italic"}}>
                "루틴은 의지로 지키는 게 아니다. 환경을 세팅해두면 뇌가 자동으로 따라간다."
              </div>
            </div>
          )}
        </div>
      )}

      {/* AI 브리핑 */}
      {tab==="brief"&&(
        <div style={{...W.wrap,marginTop:18}}>
          <div style={{background:"#0a140a",border:"1px solid #1a3a1a",borderRadius:14,padding:22,minHeight:160}}>
            {briefLoading?(<div style={{textAlign:"center",paddingTop:40}}><div style={{fontSize:24,color:"#4ade80",marginBottom:10,display:"inline-block",animation:"spin 1.5s linear infinite"}}>✦</div><div style={{fontSize:12,color:"#1a3a1a"}}>분석 중...</div></div>)
            :brief?(<div style={{fontSize:13,lineHeight:2,color:"#c8e6c9",whiteSpace:"pre-wrap"}}>{brief}</div>)
            :(<div style={{textAlign:"center",color:"#1a3a1a",paddingTop:40,fontSize:12}}>오늘 할 일을 체크한 뒤<br/>브리핑을 요청해보세요</div>)}
          </div>
          <button onClick={fetchBrief} style={{width:"100%",marginTop:10,padding:"11px",background:"#0a140a",border:"1px solid #1a3a1a",borderRadius:10,color:"#4ade80",fontSize:12,cursor:"pointer"}}>↺ 다시 분석</button>
          <button onClick={()=>setShowKey(true)} style={{width:"100%",marginTop:8,padding:"10px",background:"transparent",border:"1px solid #1a1a1a",borderRadius:10,color:"#2a2a2a",fontSize:11,cursor:"pointer"}}>⚙ API 키 설정</button>
        </div>
      )}

      {/* 기록 */}
      {tab==="history"&&(
        <div style={{...W.wrap,marginTop:18}}>
          <div style={{fontSize:11,color:"#2a2a2a",marginBottom:14,textAlign:"center"}}>저장된 기록 {Object.keys(history).length}일 · ☁️ 클라우드 동기화</div>
          {Object.entries(history).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30).map(([key,val])=>{
            const d=new Date(key);
            return(
              <div key={key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 15px",background:"#111",borderRadius:10,border:"1px solid #161616",marginBottom:7}}>
                <div style={{fontSize:12,color:"#666"}}>{d.getMonth()+1}/{d.getDate()} ({DAYS[d.getDay()]})</div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{height:4,width:60,background:"#1a1a1a",borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${val.progress}%`,background:val.completed?"#4ade80":"#f97316",borderRadius:99}}/>
                  </div>
                  <div style={{fontSize:12,fontWeight:700,color:val.progress>=70?"#4ade80":"#f97316",minWidth:30}}>{val.progress}%</div>
                  <div style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:val.completed?"#052e16":"#1c0a00",color:val.completed?"#4ade80":"#f97316",border:`1px solid ${val.completed?"#166534":"#431407"}`}}>
                    {val.completed?"달성":"미달성"}
                  </div>
                </div>
              </div>
            );
          })}
          {Object.keys(history).length===0&&(<div style={{textAlign:"center",color:"#1e1e1e",paddingTop:40,fontSize:12}}>아직 기록이 없어요.<br/>오늘부터 시작해보세요.</div>)}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
